services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot_ai
      POSTGRES_USER: chatbot_ai
      POSTGRES_PASSWORD: chatbot_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatbot_ai -d chatbot_ai']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
