base_model: "HuggingFaceTB/SmolLM2-135M-Instruct" # Small instruct model chosen to keep first local LoRA runs feasible.
adapter_name: "local-lora-tutor-v1"
output_dir: "ml/adapters/local-lora-tutor-v1"
num_train_epochs: 1
learning_rate: 0.0002
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
max_seq_length: 768
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
